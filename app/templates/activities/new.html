{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Add Activity — {{ camp.name }}</h2>
  <p class="muted">Create an activity that can later be scheduled into the camp programme.</p>

  <a class="button secondary" href="/camps/{{ camp.id }}/activities">Back to Activities</a>
</section>

<section class="card">
  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <form method="post" action="/camps/{{ camp.id }}/activities/new">
    <label for="name">Activity Name</label>
    <input id="name" name="name" required placeholder="Pioneering bases, Wide game, Campfire...">

    <label for="description">Description</label>
    <textarea id="description" name="description" placeholder="What happens in this activity?"></textarea>

    <label for="default_duration_minutes">Default Duration (minutes)</label>
    <input id="default_duration_minutes" name="default_duration_minutes" type="number" min="1" value="60" required>

    <label for="default_location">Default Location</label>
    <input id="default_location" name="default_location" placeholder="Main field, woodland trail, activity shelter...">

    <label for="activity_lead_id">Activity Lead</label>
    <select id="activity_lead_id" name="activity_lead_id">
      <option value="0">Not set</option>
      {% for person in people %}
        <option value="{{ person.id }}">{{ person.first_name }} {{ person.last_name }} — {{ person.person_type }}</option>
      {% endfor %}
    </select>

    <label for="supporting_adults_notes">Supporting Adults</label>
    <textarea id="supporting_adults_notes" name="supporting_adults_notes" placeholder="Who else is needed? Any supervision notes?"></textarea>

    <label for="equipment_notes">Equipment Notes</label>
    <textarea id="equipment_notes" name="equipment_notes" placeholder="Equipment, consumables, setup notes..."></textarea>

    <label for="risk_notes">Risk / Safety Notes</label>
    <textarea id="risk_notes" name="risk_notes" placeholder="Key safety considerations. This does not replace the real risk assessment."></textarea>

    <label for="wet_weather_alternative">Wet Weather Alternative</label>
    <textarea id="wet_weather_alternative" name="wet_weather_alternative" placeholder="What should happen if the weather is poor?"></textarea>

    <label for="badge_notes">Badge / Requirement Notes</label>
    <textarea id="badge_notes" name="badge_notes" placeholder="For now, record badge links or requirements as notes. A formal badge system can come later."></textarea>

    <div class="form-actions">
      <button type="submit">Create Activity</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/activities">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
