<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Camp Command Centre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --brand: #243447;
      --accent: #1f7a8c;
      --warn: #b54708;
      --border: #d0d5dd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      background: var(--brand);
      color: white;
      padding: 1rem 1.5rem;
    }
    header h1 { margin: 0; font-size: 1.4rem; }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin: 1rem 0;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
    }
    .card h3 { margin-top: 0; }
    .badge {
      display: inline-block;
      padding: .25rem .6rem;
      border-radius: 999px;
      background: #e0f2fe;
      color: #075985;
      font-size: .85rem;
    }
    .warning { color: var(--warn); font-weight: bold; }
    .button {
      display: inline-block;
      padding: .55rem .8rem;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      margin-right: .5rem;
    }
    ol { padding-left: 1.3rem; }
  </style>
</head>
<body>
  <header>
    <h1>Camp Command Centre</h1>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
