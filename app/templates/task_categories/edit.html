{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Edit Task Category</h2>
  <p class="muted">Update this task category for {{ camp.name }}.</p>

  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <form method="post" action="/camps/{{ camp.id }}/task-categories/{{ category.id }}/edit">
    <label for="name">Category Name</label>
    <input id="name" name="name" required value="{{ category.name }}">

    <label for="description">Description / Definition</label>
    <textarea id="description" name="description">{{ category.description or '' }}</textarea>

    <label for="sort_order">Sort Order</label>
    <input id="sort_order" name="sort_order" type="number" value="{{ category.sort_order }}">

    <label>
      <input type="checkbox" name="is_active" {% if category.is_active %}checked{% endif %} style="width:auto;">
      Active
    </label>

    <div class="form-actions">
      <button type="submit">Save Changes</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/task-categories">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
