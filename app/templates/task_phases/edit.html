{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Edit Task Phase</h2>
  <p class="muted">Update this phase for {{ camp.name }}.</p>

  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <form method="post" action="/camps/{{ camp.id }}/task-phases/{{ phase.id }}/edit">
    <label for="name">Phase Name</label>
    <input id="name" name="name" required value="{{ phase.name }}">

    <label for="sort_order">Sort Order</label>
    <input id="sort_order" name="sort_order" type="number" value="{{ phase.sort_order }}">

    <label>
      <input type="checkbox" name="is_active" {% if phase.is_active %}checked{% endif %} style="width:auto;">
      Active
    </label>

    <div class="form-actions">
      <button type="submit">Save Changes</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/task-phases">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
