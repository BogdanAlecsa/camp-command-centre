{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Edit Section — {{ camp.name }}</h2>

  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <form method="post">
    <label for="participating_group_id">Participating Group</label>
    <select id="participating_group_id" name="participating_group_id" required>
      {% for group in participating_groups %}
        <option value="{{ group.id }}" {% if section.participating_group_id == group.id %}selected{% endif %}>{{ group.name }}</option>
      {% endfor %}
    </select>

    <label for="name">Section Name</label>
    <input id="name" name="name" required value="{{ section.name }}">

    <label for="section_type">Section Type</label>
    <select id="section_type" name="section_type">
      {% for section_type in section_types %}
        <option value="{{ section_type }}" {% if section.section_type == section_type %}selected{% endif %}>{{ section_type }}</option>
      {% endfor %}
    </select>

    <label for="sort_order">Sort Order</label>
    <input id="sort_order" name="sort_order" type="number" value="{{ section.sort_order }}">

    <label>
      <input type="checkbox" name="is_active" value="yes" {% if section.is_active %}checked{% endif %}>
      Active
    </label>

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes">{{ section.notes or "" }}</textarea>

    <div class="form-actions">
      <button type="submit">Save Section</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/sections">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
