{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Add Section — {{ camp.name }}</h2>

  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <form method="post">
    <label for="participating_group_id">Participating Group</label>
    <select id="participating_group_id" name="participating_group_id" required>
      {% for group in participating_groups %}
        <option value="{{ group.id }}">{{ group.name }}</option>
      {% endfor %}
    </select>

    <label for="name">Section Name</label>
    <input id="name" name="name" required placeholder="e.g. Cubs, Scouts, Young Leaders">

    <label for="section_type">Section Type</label>
    <select id="section_type" name="section_type">
      {% for section_type in section_types %}
        <option value="{{ section_type }}">{{ section_type }}</option>
      {% endfor %}
    </select>

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes"></textarea>

    <div class="form-actions">
      <button type="submit">Add Section</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/sections">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
