{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Edit Person</h2>
  <p class="muted">Update details for {{ person.first_name }} {{ person.last_name }}.</p>

  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <p>
    <a class="button secondary" href="/camps/{{ camp.id }}/people/{{ person.id }}/osm-update">Update from OSM Export</a>
  </p>


  <div id="manual-duplicate-warning" class="warning" style="display: none;"></div>

  <script>
    (function () {
      const duplicatePeople = {{ duplicate_people|default([])|tojson }};

      function normaliseNamePart(value) {
        return (value || "").toString().toLowerCase().replace(/[^a-z0-9]+/g, "");
      }

      function setText(element, value) {
        element.textContent = value;
        return element;
      }

      function updateManualDuplicateWarning() {
        const firstNameInput = document.getElementById("first_name");
        const lastNameInput = document.getElementById("last_name");
        const sectionInput = document.getElementById("home_section_id");
        const warningBox = document.getElementById("manual-duplicate-warning");

        if (!firstNameInput || !lastNameInput || !warningBox) {
          return;
        }

        const firstKey = normaliseNamePart(firstNameInput.value);
        const lastKey = normaliseNamePart(lastNameInput.value);
        const selectedSectionId = sectionInput ? sectionInput.value : "";

        warningBox.innerHTML = "";
        warningBox.style.display = "none";

        if (!firstKey || !lastKey) {
          return;
        }

        const matches = duplicatePeople.filter(function (person) {
          return person.first_name_key === firstKey && person.last_name_key === lastKey;
        });

        if (!matches.length) {
          return;
        }

        const sameSectionMatches = matches.filter(function (person) {
          return String(person.home_section_id || "") === String(selectedSectionId || "");
        });

        const title = document.createElement("strong");
        title.textContent = sameSectionMatches.length
          ? "Possible duplicate in this section."
          : "Possible duplicate elsewhere in this camp.";

        warningBox.appendChild(title);
        warningBox.appendChild(document.createElement("br"));

        const message = document.createElement("span");
        message.textContent = "This does not stop you saving, but check before continuing.";
        warningBox.appendChild(message);

        const list = document.createElement("ul");
        list.style.margin = ".45rem 0 0 1rem";
        list.style.padding = "0";

        matches.forEach(function (person) {
          const item = document.createElement("li");

          const name = document.createElement("strong");
          name.textContent = person.display_name;
          item.appendChild(name);

          item.appendChild(document.createElement("br"));
          item.appendChild(setText(document.createElement("span"), person.location || "No section assigned"));

          item.appendChild(document.createElement("br"));

          const link = document.createElement("a");
          link.href = person.person_url;
          link.target = "_blank";
          link.rel = "noopener";
          link.textContent = "Open existing person";
          item.appendChild(link);

          list.appendChild(item);
        });

        warningBox.appendChild(list);
        warningBox.style.display = "block";
      }

      document.addEventListener("DOMContentLoaded", function () {
        ["first_name", "last_name", "home_section_id"].forEach(function (id) {
          const element = document.getElementById(id);
          if (element) {
            element.addEventListener("input", updateManualDuplicateWarning);
            element.addEventListener("change", updateManualDuplicateWarning);
          }
        });

        updateManualDuplicateWarning();
      });
    })();
  </script>

  <form method="post" action="/camps/{{ camp.id }}/people/{{ person.id }}/edit">
    <label for="first_name">First Name</label>
    <input id="first_name" name="first_name" required value="{{ person.first_name }}">

    <label for="last_name">Last Name</label>
    <input id="last_name" name="last_name" required value="{{ person.last_name }}">

    <label for="person_type">Person Type</label>
    <select id="person_type" name="person_type">
      {% for option in [
        "Young Person",
        "Parent/Guardian",
        "Leader",
        "Helper",
        "Young Leader",
        "Visitor"
      ] %}
        <option {% if person.person_type == option %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>

    <label for="home_section_id">Home Section</label>
    <select id="home_section_id" name="home_section_id">
      <option value="">Not set</option>
      {% for section in sections %}
        <option value="{{ section.id }}" {% if person.home_section_id == section.id %}selected{% endif %}>{% set group = participating_group_lookup.get(section.participating_group_id) if participating_group_lookup is defined else None %}{{ group.name ~ " → " if group else "" }}{{ section.name }}</option>
      {% endfor %}
    </select>

    <label for="section_unit">Section Unit / Six / Patrol</label>
    <input id="section_unit" name="section_unit" value="{{ person.section_unit or '' }}">

    <label for="attendance_status">Attendance Status</label>
    <select id="attendance_status" name="attendance_status">
      {% for option in ["Expected", "Provisional", "Confirmed", "Not Attending", "Withdrawn", "Unknown"] %}
        <option value="{{ option }}" {% if person.attendance_status == option %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>

    <label for="information_source">Information Source</label>
    <select id="information_source" name="information_source">
      {% for option in ["Manual Entry", "Provisional", "OSM Attendee List", "OSM Member File", "Camp Form", "Leader Update"] %}
        <option value="{{ option }}" {% if person.information_source == option %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>

    <label>
      <input type="checkbox" name="is_provisional" value="yes" {% if person.is_provisional %}checked{% endif %}>
      Provisional placeholder
    </label>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" value="{{ person.email or '' }}">

    <label for="phone">Phone</label>
    <input id="phone" name="phone" value="{{ person.phone or '' }}">

    <h3>Primary Contact</h3>

    <label for="primary_contact_name">Primary Contact Name</label>
    <input id="primary_contact_name" name="primary_contact_name" value="{{ person.primary_contact_name or '' }}">

    <label for="primary_contact_relationship">Primary Contact Relationship</label>
    <input id="primary_contact_relationship" name="primary_contact_relationship" value="{{ person.primary_contact_relationship or '' }}">

    <label for="primary_contact_phone">Primary Contact Phone</label>
    <input id="primary_contact_phone" name="primary_contact_phone" value="{{ person.primary_contact_phone or '' }}">

    <label for="primary_contact_email">Primary Contact Email</label>
    <input id="primary_contact_email" name="primary_contact_email" type="email" value="{{ person.primary_contact_email or '' }}">

    <h3>Emergency Contact</h3>

    <label for="emergency_contact_name">Emergency Contact Name</label>
    <input id="emergency_contact_name" name="emergency_contact_name" value="{{ person.emergency_contact_name or '' }}">

    <label for="emergency_contact_relationship">Emergency Contact Relationship</label>
    <input id="emergency_contact_relationship" name="emergency_contact_relationship" value="{{ person.emergency_contact_relationship or '' }}">

    <label for="emergency_contact_phone">Emergency Contact Phone</label>
    <input id="emergency_contact_phone" name="emergency_contact_phone" value="{{ person.emergency_contact_phone or '' }}">

    <label for="emergency_contact_email">Emergency Contact Email</label>
    <input id="emergency_contact_email" name="emergency_contact_email" type="email" value="{{ person.emergency_contact_email or '' }}">

    <h3>Health, Medical and Dietary</h3>

    <label for="allergies">Allergies</label>
    <textarea id="allergies" name="allergies">{{ person.allergies or '' }}</textarea>

    <label for="allergy_action">Allergy Action / Severity Notes</label>
    <textarea id="allergy_action" name="allergy_action">{{ person.allergy_action or '' }}</textarea>

    <label for="medication">Medication</label>
    <textarea id="medication" name="medication">{{ person.medication or '' }}</textarea>

    <label for="medical_notes">Medical Notes</label>
    <textarea id="medical_notes" name="medical_notes">{{ person.medical_notes or '' }}</textarea>

    <label for="dietary_requirements">Dietary Requirements</label>
    <textarea id="dietary_requirements" name="dietary_requirements">{{ person.dietary_requirements or '' }}</textarea>

    <label for="role_notes">Notes</label>
    <textarea id="role_notes" name="role_notes">{{ person.role_notes or '' }}</textarea>

    <div class="form-actions">
      <button type="submit">Save Changes</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/people/{{ person.id }}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
