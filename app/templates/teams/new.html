{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Add Team</h2>
  <p class="muted">Add a team or group to {{ camp.name }}.</p>

  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <form method="post" action="/camps/{{ camp.id }}/teams/new">
    <label for="name">Team Name</label>
    <input id="name" name="name" required placeholder="Red Six, Kitchen Team, Saturday Duty Team...">

    <label for="team_type">Team Type</label>
    <select id="team_type" name="team_type">
      <option>Patrol/Six</option>
      <option>Leader Team</option>
      <option>Helper Team</option>
      <option>Tent Group</option>
      <option>Activity Group</option>
      <option>Duty Team</option>
      <option>Transport Group</option>
      <option>Custom</option>
    </select>

    <label for="description">Description</label>
    <textarea id="description" name="description" placeholder="What this team is for"></textarea>

    <div class="form-actions">
      <button type="submit">Add Team</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/teams">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
