{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Add Task</h2>
  <p class="muted">Add a task to {{ camp.name }}.</p>

  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <form method="post" action="/camps/{{ camp.id }}/tasks/new">
    <label for="title">Task Title</label>
    <input id="title" name="title" required placeholder="Book minibus, check kit list, prepare parent pack...">

    <label for="description">Description</label>
    <textarea id="description" name="description"></textarea>

    <label for="category">Category</label>
    <select id="category" name="category">
      <option value="">No category yet</option>
      {% for category in categories %}
        <option value="{{ category.name }}">{{ category.name }}</option>
      {% endfor %}
    </select>
    <p class="muted"><a href="/camps/{{ camp.id }}/task-categories" target="_blank" rel="noopener noreferrer">Manage categories</a></p>

    <label for="phase">Phase</label>
    <select id="phase" name="phase">
      <option value="">No phase yet</option>
      {% for phase in phases %}
        <option value="{{ phase.name }}">{{ phase.name }}</option>
      {% endfor %}
    </select>
    <p class="muted"><a href="/camps/{{ camp.id }}/task-phases" target="_blank" rel="noopener noreferrer">Manage phases</a></p>

    <label for="priority">Priority</label>
    <select id="priority" name="priority">
      <option>Low</option>
      <option selected>Normal</option>
      <option>High</option>
      <option>Urgent</option>
    </select>

    <label for="status">Status</label>
    <select id="status" name="status">
      <option selected>To Do</option>
      <option>In Progress</option>
      <option>Blocked</option>
      <option>Done</option>
    </select>

    <label for="due_date">Due Date</label>
    <input id="due_date" name="due_date" type="date">

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes"></textarea>

    <div class="form-actions">
      <button type="submit">Add Task</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/tasks">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
