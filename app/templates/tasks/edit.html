{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Edit Task</h2>
  <p class="muted">Update details for "{{ task.title }}".</p>

  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <form method="post" action="/camps/{{ camp.id }}/tasks/{{ task.id }}/edit">
    <label for="title">Task Title</label>
    <input id="title" name="title" required value="{{ task.title }}">

    <label for="description">Description</label>
    <textarea id="description" name="description">{{ task.description or '' }}</textarea>

    <label for="category">Category</label>
    <select id="category" name="category">
      <option value="" {% if not task.category %}selected{% endif %}>No category yet</option>
      {% for category in categories %}
        <option value="{{ category.name }}" {% if task.category == category.name %}selected{% endif %}>{{ category.name }}</option>
      {% endfor %}
    </select>
    <p class="muted"><a href="/camps/{{ camp.id }}/task-categories" target="_blank" rel="noopener noreferrer">Manage categories</a></p>

    <label for="phase">Phase</label>
    <select id="phase" name="phase">
      <option value="" {% if not task.phase %}selected{% endif %}>No phase yet</option>
      {% for phase in phases %}
        <option value="{{ phase.name }}" {% if task.phase == phase.name %}selected{% endif %}>{{ phase.name }}</option>
      {% endfor %}
    </select>
    <p class="muted"><a href="/camps/{{ camp.id }}/task-phases" target="_blank" rel="noopener noreferrer">Manage phases</a></p>

    <label for="priority">Priority</label>
    <select id="priority" name="priority">
      {% for option in ["Low", "Normal", "High", "Urgent"] %}
        <option {% if task.priority == option %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>

    <label for="status">Status</label>
    <select id="status" name="status">
      {% for option in ["To Do", "In Progress", "Blocked", "Done"] %}
        <option {% if task.status == option %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>

    <label for="due_date">Due Date</label>
    <input id="due_date" name="due_date" type="date" value="{{ task.due_date or '' }}">

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes">{{ task.notes or '' }}</textarea>

    <div class="form-actions">
      <button type="submit">Save Changes</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/tasks/{{ task.id }}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
