{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>Edit Participating Group — {{ camp.name }}</h2>

  {% if error %}
    <p class="warning">{{ error }}</p>
  {% endif %}

  <form method="post">
    <label for="name">Group / Unit Name</label>
    <input id="name" name="name" required value="{{ group.name }}">

    <label for="group_type">Group Type</label>
    <select id="group_type" name="group_type">
      {% for group_type in group_types %}
        <option value="{{ group_type }}" {% if group.group_type == group_type %}selected{% endif %}>{{ group_type }}</option>
      {% endfor %}
    </select>

    <label for="contact_name">Contact Name</label>
    <input id="contact_name" name="contact_name" value="{{ group.contact_name or "" }}">

    <label for="contact_email">Contact Email</label>
    <input id="contact_email" name="contact_email" type="email" value="{{ group.contact_email or "" }}">

    <label for="contact_phone">Contact Phone</label>
    <input id="contact_phone" name="contact_phone" value="{{ group.contact_phone or "" }}">

    <label for="sort_order">Sort Order</label>
    <input id="sort_order" name="sort_order" type="number" value="{{ group.sort_order }}">

    <label>
      <input type="checkbox" name="is_active" value="yes" {% if group.is_active %}checked{% endif %}>
      Active
    </label>

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes">{{ group.notes or "" }}</textarea>

    <div class="form-actions">
      <button type="submit">Save Participating Group</button>
      <a class="button secondary" href="/camps/{{ camp.id }}/participating-groups">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
